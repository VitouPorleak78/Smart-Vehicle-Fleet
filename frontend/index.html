<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFleet Test Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-12 font-sans">

    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-100 p-6 md:p-8">
        <div class="border-b border-slate-100 pb-4 mb-6">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">👤 SmartFleet Portal</h1>
            <p class="text-sm text-slate-500 mt-1">Active Driver Session: <span class="font-semibold text-slate-700">Vitou</span></p>
        </div>

        <form id="telemetryForm" class="space-y-6">
            <div>
                <h2 class="text-lg font-bold text-slate-800 mb-3">Step 1: Select Propulsion Type</h2>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    
                    <div id="card-ICE" onclick="selectType('ICE')" class="p-5 rounded-xl border-2 border-slate-200 bg-white hover:border-slate-300 cursor-pointer transition-all flex flex-col justify-between">
                        <div class="text-3xl mb-2">⛽</div>
                        <div>
                            <p class="font-bold text-slate-900">Fuel Only (ICE)</p>
                            <p class="text-xs text-slate-400 mt-0.5">Conventional engines</p>
                        </div>
                    </div>

                    <div id="card-EV" onclick="selectType('EV')" class="p-5 rounded-xl border-2 border-slate-200 bg-white hover:border-slate-300 cursor-pointer transition-all flex flex-col justify-between">
                        <div class="text-3xl mb-2">⚡</div>
                        <div>
                            <p class="font-bold text-slate-900">Full Electric (EV)</p>
                            <p class="text-xs text-slate-400 mt-0.5">Battery electric</p>
                        </div>
                    </div>

                    <div id="card-PHEV" onclick="selectType('PHEV')" class="p-5 rounded-xl border-2 border-blue-600 bg-blue-50/50 ring-2 ring-blue-600/10 cursor-pointer transition-all flex flex-col justify-between">
                        <div class="text-3xl mb-2">🔋</div>
                        <div>
                            <p class="font-bold text-slate-900">Hybrid (PHEV)</p>
                            <p class="text-xs text-slate-500 mt-0.5">Plug-in hybrid</p>
                        </div>
                    </div>

                </div>
            </div>

            <div>
                <h2 class="text-lg font-bold text-slate-800 mb-3">Step 2: Log Metrics</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700">Plate Number</label>
                        <input type="text" id="vehicleID" required placeholder="e.g., 101" class="mt-1 block w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-slate-50/50">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700">Odometer Reading (KM)</label>
                        <input type="number" id="current_mileage" required placeholder="Enter total mileage" class="mt-1 block w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-slate-50/50">
                    </div>

                    <div id="fuelSection" class="p-4 bg-orange-50/60 rounded-xl border border-orange-100 space-y-1">
                        <label class="block text-sm font-bold text-orange-800">Fuel Consumed (Liters) / Ratio</label>
                        <input type="number" step="0.01" id="fuelUsage" placeholder="Enter fuel consumed or ratio score" class="mt-1 block w-full p-3 border border-orange-200 bg-white rounded-lg outline-none focus:ring-2 focus:ring-orange-400">
                    </div>

                    <div id="batterySection" class="p-4 bg-emerald-50/60 rounded-xl border border-emerald-100 space-y-1">
                        <label class="block text-sm font-bold text-emerald-800">Battery Discharge (%)</label>
                        <input type="number" id="batteryDischarge" placeholder="e.g., 95" class="mt-1 block w-full p-3 border border-emerald-200 bg-white rounded-lg outline-none focus:ring-2 focus:ring-emerald-400">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-base shadow-lg shadow-blue-600/10 hover:bg-blue-700 active:scale-[0.99] transition-all duration-150 flex items-center justify-center gap-2 cursor-pointer">
                🚀 Submit Daily Vehicle Log
            </button>
        </form>

        <div id="monitorBoard" class="mt-8 hidden p-5 rounded-xl border transition-all">
            <h3 class="font-bold text-sm tracking-wider uppercase mb-2 text-slate-500">Live API Response Diagnostic</h3>
            <p id="monitorStatus" class="text-xl font-extrabold text-slate-900 mb-1"></p>
            <p id="monitorReason" class="text-sm text-slate-600"></p>
        </div>
    </div>

    <script>
        let selectedPropulsion = 'PHEV';

        function selectType(type) {
            selectedPropulsion = type;
            const classes = {
                active: ['border-blue-600', 'bg-blue-50/50', 'ring-2', 'ring-blue-600/10'],
                inactive: ['border-slate-200', 'bg-white']
            };

            ['ICE', 'EV', 'PHEV'].forEach(t => {
                const card = document.getElementById(`card-${t}`);
                if (t === type) {
                    card.classList.add(...classes.active);
                    card.classList.remove(...classes.inactive);
                } else {
                    card.classList.remove(...classes.active);
                    card.classList.add(...classes.inactive);
                }
            });

            // Toggle Input visibility fields matching your backend rule strategy switches
            document.getElementById('fuelSection').style.display = (type === 'EV') ? 'none' : 'block';
            document.getElementById('batterySection').style.display = (type === 'ICE') ? 'none' : 'block';
        }

        document.getElementById('telemetryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Package payload object
            const payload = {
                vehicleID: parseInt(document.getElementById('vehicleID').value),
                current_mileage: parseInt(document.getElementById('current_mileage').value),
                propulsionType: selectedPropulsion
            };

            if (selectedPropulsion !== 'EV') {
                const val = parseFloat(document.getElementById('fuelUsage').value || 0);
                payload.fuelUsage = val;
                payload.fuel_to_electric_ratio = val; // bindings for both versions of backend test mathematical metrics
            }
            if (selectedPropulsion !== 'ICE') {
                payload.batteryDischarge = parseInt(document.getElementById('batteryDischarge').value || 0);
            }

            try {
                const response = await fetch('http://localhost:5000/api/telemetry/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                // Show diagnostics monitoring board card block dynamically
                const board = document.getElementById('monitorBoard');
                const statusTxt = document.getElementById('monitorStatus');
                const reasonTxt = document.getElementById('monitorReason');

                board.classList.remove('hidden', 'bg-red-50', 'border-red-200', 'bg-green-50', 'border-green-200');
                
                if (data.status?.triggerService) {
                    board.classList.add('bg-red-50', 'border-red-200');
                    statusTxt.innerText = "🚨 Action Required (Maintenance Triggered)";
                    statusTxt.className = "text-xl font-extrabold text-red-900 mb-1";
                } else {
                    board.classList.add('bg-green-50', 'border-green-200');
                    statusTxt.innerText = "🟢 System Nominal (Operational Clean)";
                    statusTxt.className = "text-xl font-extrabold text-green-900 mb-1";
                }
                reasonTxt.innerText = data.status?.reason || data.message;

            } catch (err) {
                alert("Error connecting to Express server engine. Make sure npm start is running on port 5000!");
            }
        });
    </script>
</body>
</html>
